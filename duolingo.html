<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cybersecurity Vocabulary</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #58cc02;
            --primary-dark: #58a700;
            --secondary: #1cb0f6;
            --secondary-dark: #1899d6;
            --bg: #ffffff;
            --text: #3c3c3c;
            --gray: #e5e5e5;
            --error: #ff4b4b;
            --warning: #ffc800;
            --warning-dark: #e5b400;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
        }

        body {
            background-color: #f7f7f7;
            color: var(--text);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: var(--text);
            font-size: 36px;
        }

        .tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1000px;
        }

        .tab-btn {
            background: var(--bg);
            border: 2px solid var(--gray);
            padding: 12px 24px;
            border-radius: 16px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            color: #afafaf;
            transition: all 0.2s;
            box-shadow: 0 4px 0 var(--gray);
            width: 220px; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .tab-btn.active {
            border-color: var(--secondary);
            color: var(--secondary);
            box-shadow: 0 4px 0 var(--secondary-dark);
        }

        .tab-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 transparent;
        }

        .section {
            display: none;
            width: 100%;
            max-width: 1200px;
            animation: fadeIn 0.5s ease;
        }

        .section.active {
            display: block;
        }

        .slider-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            width: 100%;
            margin: 0 auto;
        }

        .nav-btn {
            background: var(--bg);
            border: 2px solid var(--gray);
            color: var(--text);
            font-size: 32px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 0 var(--gray);
            transition: all 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .nav-btn:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: 0 0 0 transparent;
        }

        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .single-card {
            background: var(--bg);
            border: 2px solid var(--gray);
            border-radius: 32px;
            padding: 40px; 
            box-shadow: 0 8px 0 var(--gray);
            width: 100%;
            max-width: 1000px;
            height: 480px;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            gap: 40px;
            animation: popIn 0.3s ease;
        }

        .card-image-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }

        .word-image {
            width: 100%;
            max-width: 450px;
            height: 350px; 
            object-fit: contain; 
            border-radius: 20px;
        }

        .card-text-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            height: 100%;
        }

        .word-en {
            font-size: 48px;
            font-weight: 800;
            color: var(--text);
            line-height: 1.1;
            height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .word-ru {
            font-size: 28px;
            color: #777;
            height: 70px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .controls-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 30px;
        }

        .progress-text {
            font-size: 22px;
            font-weight: 700;
            color: #afafaf;
        }

        .play-btn {
            background: var(--secondary);
            color: white;
            border: none;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-size: 36px;
            cursor: pointer;
            box-shadow: 0 6px 0 var(--secondary-dark);
            transition: all 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .play-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 transparent;
        }

        .autoplay-btn {
            background: var(--warning);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 20px;
            font-size: 20px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 6px 0 var(--warning-dark);
            transition: all 0.1s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .autoplay-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 transparent;
        }

        .autoplay-btn.playing {
            background: var(--error);
            box-shadow: 0 6px 0 #cc0000;
        }

        /* Стили для ввода текста (Написание) */
        .spell-input-group {
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 500px;
            margin-top: 10px;
        }

        .spell-input {
            flex: 1;
            padding: 15px 20px;
            font-size: 22px;
            border: 2px solid var(--gray);
            border-radius: 16px;
            outline: none;
            transition: border-color 0.2s;
            font-weight: 700;
            color: var(--text);
        }

        .spell-input:focus {
            border-color: var(--secondary);
        }

        .check-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 16px;
            font-size: 20px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 6px 0 var(--primary-dark);
            transition: all 0.1s;
        }

        .check-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 transparent;
        }

        .spell-feedback {
            margin-top: 20px;
            font-size: 20px;
            font-weight: 800;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .feedback-correct { color: var(--primary); animation: popIn 0.3s ease; }
        .feedback-wrong { color: var(--error); animation: shake 0.4s ease; }

        .match-container {
            display: flex;
            justify-content: space-between;
            gap: 30px;
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
        }

        .match-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 50%;
        }

        .match-btn {
            background: var(--bg);
            border: 2px solid var(--gray);
            padding: 15px 20px;
            border-radius: 20px;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 6px 0 var(--gray);
            text-align: center;
            word-wrap: break-word;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 90px; 
        }

        .match-btn.selected {
            border-color: var(--secondary);
            background: #ddf4ff;
            color: var(--secondary-dark);
            box-shadow: 0 6px 0 var(--secondary-dark);
            transform: translateY(2px);
        }

        .match-btn.correct {
            border-color: var(--primary);
            background: #d7ffb8;
            color: var(--primary-dark);
            box-shadow: 0 6px 0 var(--primary-dark);
            pointer-events: none;
            animation: popIn 0.3s ease;
        }

        .match-btn.wrong {
            border-color: var(--error);
            background: #ffdfe0;
            color: #ea2b2b;
            box-shadow: 0 6px 0 #ea2b2b;
            animation: shake 0.4s ease;
        }

        @media (max-width: 850px) {
            h1 { font-size: 28px; }
            
            .single-card {
                flex-direction: column;
                padding: 20px;
                gap: 15px;
                height: auto;
                min-height: 540px;
                justify-content: flex-start;
            }

            .card-image-wrapper {
                height: 200px;
                width: 100%;
                flex: none;
            }

            .word-image {
                height: 100%;
                width: 100%;
            }

            .card-text-wrapper {
                height: auto;
                width: 100%;
                flex: none;
                justify-content: flex-start;
            }

            .word-en { font-size: 32px; height: 80px; }
            .word-ru { font-size: 20px; height: 60px; margin-bottom: 15px; }
            .play-btn { width: 60px; height: 60px; font-size: 28px; }

            .slider-wrapper { gap: 15px; }
            .nav-btn { width: 50px; height: 50px; font-size: 24px; }
            
            .match-container { gap: 15px; }
            .match-btn { font-size: 16px; min-height: 75px; padding: 10px; }

            .spell-input-group { flex-direction: column; }
            .spell-input { width: 100%; }
            .check-btn { width: 100%; }
        }

        @media (max-width: 500px) {
            .tab-btn { width: 100%; font-size: 16px; padding: 10px; }
            .single-card { min-height: 480px; padding: 15px; }
            .card-image-wrapper { height: 160px; }
            .word-en { font-size: 26px; height: 70px; }
            .word-ru { font-size: 18px; height: 50px; margin-bottom: 15px; }
            .nav-btn { width: 40px; height: 40px; font-size: 18px; }
            .match-btn { font-size: 14px; min-height: 65px; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes popIn {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.02); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        .success-message {
            display: none;
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            color: var(--primary);
            margin-top: 40px;
            animation: popIn 0.5s ease;
        }
    </style>
</head>
<body>

    <h1>Lesson 1: Cybersecurity</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('learn')">📚 Лексика</button>
        <button class="tab-btn" onclick="switchTab('pronounce')">🗣 Произношение</button>
        <button class="tab-btn" onclick="switchTab('spell')">✍️ Написание</button>
        <button class="tab-btn" onclick="switchTab('match')">🎮 Найди пару</button>
    </div>

    <!-- Вкладка 1: Лексика (с автоозвучкой) -->
    <div id="learn" class="section active">
        <div class="slider-wrapper">
            <button class="nav-btn" id="prev-btn" onclick="prevCard()">&#10094;</button>
            <div id="single-card-container" style="width: 100%; display: flex; justify-content: center;"></div>
            <button class="nav-btn" id="next-btn" onclick="nextCard()">&#10095;</button>
        </div>
        <div class="controls-container">
            <div class="progress-text" id="card-progress">1 / 20</div>
            <button class="autoplay-btn" id="autoplay-btn" onclick="toggleAutoplay()">
                ▶️ Слайдшоу
            </button>
        </div>
    </div>

    <!-- Вкладка 2: Произношение (без автоозвучки) -->
    <div id="pronounce" class="section">
        <div class="slider-wrapper">
            <button class="nav-btn" id="prev-pronounce-btn" onclick="prevPronounceCard()">&#10094;</button>
            <div id="pronounce-card-container" style="width: 100%; display: flex; justify-content: center;"></div>
            <button class="nav-btn" id="next-pronounce-btn" onclick="nextPronounceCard()">&#10095;</button>
        </div>
        <div class="controls-container">
            <div class="progress-text" id="pronounce-progress">1 / 20</div>
        </div>
    </div>

    <!-- Вкладка 3: Написание -->
    <div id="spell" class="section">
        <div class="slider-wrapper">
            <button class="nav-btn" id="prev-spell-btn" onclick="prevSpellCard()">&#10094;</button>
            
            <div class="single-card" style="flex-direction: column; justify-content: center;">
                <img id="spell-img" class="word-image" style="height: 200px; width: auto; margin-bottom: 10px;">
                <div id="spell-ru" class="word-ru" style="height: auto; margin-bottom: 10px; font-size: 24px;"></div>
                
                <div class="spell-input-group">
                    <input type="text" id="spell-input" class="spell-input" placeholder="Напишите по-английски..." autocomplete="off">
                    <button class="check-btn" onclick="checkSpelling()">Проверить</button>
                </div>
                <div id="spell-feedback" class="spell-feedback"></div>
            </div>

            <button class="nav-btn" id="next-spell-btn" onclick="nextSpellCard()">&#10095;</button>
        </div>
        <div class="controls-container">
            <div class="progress-text" id="spell-progress">1 / 20</div>
        </div>
    </div>

    <!-- Вкладка 4: Найди пару -->
    <div id="match" class="section">
        <div style="text-align: center; margin-bottom: 25px;">
            <button class="autoplay-btn" style="margin: 0 auto; background: var(--secondary); box-shadow: 0 6px 0 var(--secondary-dark);" onclick="restartMatch()">
                🔄 Перезапустить игру
            </button>
        </div>
        <div class="match-container">
            <div class="match-column" id="col-en"></div>
            <div class="match-column" id="col-ru"></div>
        </div>
        <div class="success-message" id="success-msg">🎉 Отлично! Вы сопоставили все слова!</div>
    </div>

    <script>
        const words = [
            { en: "cybercrime", ru: "киберпреступность", img: "cybercrime.png", speech: "cyber crime" },
            { en: "a device", ru: "устройство", img: "device.png" },
            { en: "a network device", ru: "сетевое устройство", img: "network_device.png" },
            // Добавлено свойство rejected для неисчисляемых/множественных слов
            { en: "hardware", ru: "аппаратное обеспечение", img: "hardware.png", rejected: ["a hardware"] },
            { en: "software", ru: "программное обеспечение", img: "software.png", rejected: ["a software"] },
            { en: "malware", ru: "вредоносное ПО", img: "malware.png", rejected: ["a malware"] },
            { en: "a virus", ru: "вирус", img: "virus.png" },
            { en: "a hacker", ru: "хакер", img: "hacker.png" }, 
            { en: "artificial intelligence", ru: "искусственный интеллект", img: "ai.png", rejected: ["an artificial intelligence", "a artificial intelligence"] }, 
            { en: "a link", ru: "ссылка", img: "link.png" }, 
            { en: "data", ru: "данные", img: "data.png", rejected: ["a data"] }, 
            { en: "personal data", ru: "персональные данные", img: "personal_data.png", rejected: ["a personal data"] }, 
            { en: "payment data", ru: "платежные данные", img: "payment_data.png", rejected: ["a payment data"] }, 
            { en: "an access", ru: "доступ", img: "access.png" },
            { en: "an unauthorized access", ru: "несанкционированный доступ", img: "unauth.png" },
            { en: "to access", ru: "получать доступ", img: "to_access.png", speech: "to ak-SESS" }, 
            { en: "a username (login)", ru: "имя пользователя", img: "username.png", accepted: ["username", "login", "a username", "a login", "username (login)"] }, 
            { en: "a password", ru: "пароль", img: "password.png"}, 
            { en: "login credentials", ru: "реквизиты доступа", img: "login.png", accepted: ["login credential"] }, 
            { en: "a cyber attack", ru: "кибератака", img: "cyber_attack.png", speech: "cyber attack" } 
        ];

        const matchWords = [
            { en: "a device", ru: "устройство" },
            { en: "hardware", ru: "аппаратное обеспечение" },
            { en: "software", ru: "программное обеспечение" },
            { en: "malware", ru: "вредоносное ПО" },
            { en: "artificial intelligence", ru: "искусственный интеллект" },
            { en: "a link", ru: "ссылка" },
            { en: "payment data", ru: "платежные данные" },
            { en: "an unauthorized access", ru: "несанкционированный доступ" },
            { en: "login credentials", ru: "реквизиты доступа" },
            { en: "a password", ru: "пароль" }
        ];

        function speak(text, speechOverride) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                
                const textToRead = speechOverride || text;
                const utterance = new SpeechSynthesisUtterance(textToRead);
                
                utterance.lang = 'en-GB'; 
                utterance.rate = 0.85; 

                const voices = window.speechSynthesis.getVoices();
                const ukVoice = voices.find(voice => voice.lang === 'en-GB' || voice.name.includes('UK'));
                if (ukVoice) {
                    utterance.voice = ukVoice;
                }

                window.speechSynthesis.speak(utterance);
            } else {
                alert("Ваш браузер не поддерживает озвучку текста.");
            }
        }

        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
        }

        // --- ЛОГИКА ВКЛАДКИ "ЛЕКСИКА" ---
        let currentCardIndex = 0;
        let autoplayInterval = null;
        let isAutoplaying = false;

        function showCard(index, autoSpeak = true) { 
            const container = document.getElementById('single-card-container');
            const word = words[index];
            const fallbackImg = 'https://placehold.co/450x350/e5e5e5/777777?text=No+Photo';
            const speechParam = word.speech ? `'${word.en}', '${word.speech}'` : `'${word.en}'`;

            container.innerHTML = `
                <div class="single-card">
                    <div class="card-image-wrapper">
                        <img src="${word.img}" alt="${word.en}" class="word-image" onerror="this.onerror=null; this.src='${fallbackImg}';">
                    </div>
                    <div class="card-text-wrapper">
                        <div class="word-en">${word.en}</div>
                        <div class="word-ru">${word.ru}</div>
                        <button class="play-btn" onclick="speak(${speechParam})">🔊</button>
                    </div>
                </div>
            `;

            document.getElementById('card-progress').innerText = `${index + 1} / ${words.length}`;
            document.getElementById('prev-btn').disabled = index === 0;
            document.getElementById('next-btn').disabled = index === words.length - 1;

            if (autoSpeak) speak(word.en, word.speech);
        }

        function nextCard() {
            if (currentCardIndex < words.length - 1) {
                currentCardIndex++;
                showCard(currentCardIndex, true); 
            } else if (isAutoplaying) {
                stopAutoplay(); 
            }
        }

        function prevCard() {
            if (currentCardIndex > 0) {
                currentCardIndex--;
                showCard(currentCardIndex, true); 
                if (isAutoplaying) stopAutoplay(); 
            }
        }

        function toggleAutoplay() {
            const btn = document.getElementById('autoplay-btn');
            if (isAutoplaying) {
                stopAutoplay();
            } else {
                isAutoplaying = true;
                btn.innerHTML = '⏸ Остановить';
                btn.classList.add('playing');
                if (currentCardIndex === words.length - 1) currentCardIndex = 0;
                showCard(currentCardIndex, true); 
                autoplayInterval = setInterval(() => { nextCard(); }, 4000);
            }
        }

        function stopAutoplay() {
            isAutoplaying = false;
            clearInterval(autoplayInterval);
            const btn = document.getElementById('autoplay-btn');
            btn.innerHTML = '▶️ Слайдшоу';
            btn.classList.remove('playing');
        }

        // --- ЛОГИКА ВКЛАДКИ "ПРОИЗНОШЕНИЕ" ---
        let currentPronounceIndex = 0;

        function showPronounceCard(index) { 
            const container = document.getElementById('pronounce-card-container');
            const word = words[index];
            const fallbackImg = 'https://placehold.co/450x350/e5e5e5/777777?text=No+Photo';
            const speechParam = word.speech ? `'${word.en}', '${word.speech}'` : `'${word.en}'`;

            container.innerHTML = `
                <div class="single-card">
                    <div class="card-image-wrapper">
                        <img src="${word.img}" alt="${word.en}" class="word-image" onerror="this.onerror=null; this.src='${fallbackImg}';">
                    </div>
                    <div class="card-text-wrapper">
                        <div class="word-en">${word.en}</div>
                        <div class="word-ru">${word.ru}</div>
                        <button class="play-btn" onclick="speak(${speechParam})">🔊</button>
                    </div>
                </div>
            `;

            document.getElementById('pronounce-progress').innerText = `${index + 1} / ${words.length}`;
            document.getElementById('prev-pronounce-btn').disabled = index === 0;
            document.getElementById('next-pronounce-btn').disabled = index === words.length - 1;
        }

        function nextPronounceCard() {
            if (currentPronounceIndex < words.length - 1) {
                currentPronounceIndex++;
                showPronounceCard(currentPronounceIndex); 
            }
        }

        function prevPronounceCard() {
            if (currentPronounceIndex > 0) {
                currentPronounceIndex--;
                showPronounceCard(currentPronounceIndex); 
            }
        }

        // --- ЛОГИКА ВКЛАДКИ "НАПИСАНИЕ" ---
        let currentSpellIndex = 0;

        function showSpellCard(index) {
            const word = words[index];
            const fallbackImg = 'https://placehold.co/450x350/e5e5e5/777777?text=No+Photo';
            
            const imgEl = document.getElementById('spell-img');
            imgEl.src = word.img;
            imgEl.onerror = function() { this.onerror=null; this.src=fallbackImg; };
            
            document.getElementById('spell-ru').innerText = word.ru;
            
            const inputEl = document.getElementById('spell-input');
            inputEl.value = '';
            inputEl.disabled = false;
            inputEl.focus();

            const feedbackEl = document.getElementById('spell-feedback');
            feedbackEl.innerText = '';
            feedbackEl.className = 'spell-feedback';
            
            document.getElementById('spell-progress').innerText = `${index + 1} / ${words.length}`;
            document.getElementById('prev-spell-btn').disabled = index === 0;
            document.getElementById('next-spell-btn').disabled = index === words.length - 1;
        }

        function nextSpellCard() {
            if (currentSpellIndex < words.length - 1) {
                currentSpellIndex++;
                showSpellCard(currentSpellIndex);
            }
        }

        function prevSpellCard() {
            if (currentSpellIndex > 0) {
                currentSpellIndex--;
                showSpellCard(currentSpellIndex);
            }
        }

        function checkSpelling() {
            const inputEl = document.getElementById('spell-input');
            let inputVal = inputEl.value.trim().toLowerCase().replace(/\s+/g, ' ');
            
            const currentWordObj = words[currentSpellIndex];
            const correctWord = currentWordObj.en.toLowerCase();
            const feedback = document.getElementById('spell-feedback');
            
            if (!inputVal) return;

            const cleanInput = inputVal.replace(/^(a |an |to )/i, '').trim();
            const cleanCorrect = correctWord.replace(/^(a |an |to )/i, '').trim();

            let isCorrect = false;

            if (inputVal === correctWord || cleanInput === cleanCorrect) {
                isCorrect = true;
            }

            if (!isCorrect && currentWordObj.accepted) {
                const acceptedList = currentWordObj.accepted.map(w => w.toLowerCase());
                if (acceptedList.includes(inputVal) || acceptedList.includes(cleanInput)) {
                    isCorrect = true;
                }
            }

            // --- НОВОЕ: Проверка на недопустимые варианты (например, "a data") ---
            if (isCorrect && currentWordObj.rejected) {
                const rejectedList = currentWordObj.rejected.map(w => w.toLowerCase());
                if (rejectedList.includes(inputVal)) {
                    isCorrect = false;
                }
            }
            // ---------------------------------------------------------------------

            if (isCorrect) {
                feedback.innerText = '✅ Верно!';
                feedback.className = 'spell-feedback feedback-correct';
                inputEl.disabled = true;
                speak(currentWordObj.en, currentWordObj.speech);
                
                setTimeout(() => {
                    if(currentSpellIndex < words.length - 1) nextSpellCard();
                }, 1500);
            } else {
                // Кастомное сообщение об ошибке для "a data"
                if (inputVal === "a data" && currentWordObj.en === "data") {
                    feedback.innerText = '❌ Ошибка: Data — множественное число (ед. ч. — a datum)';
                } else {
                    feedback.innerText = '❌ Ошибка, попробуйте еще раз';
                }
                
                feedback.className = 'spell-feedback feedback-wrong';
                setTimeout(() => {
                    feedback.innerText = '';
                    feedback.className = 'spell-feedback';
                }, 2500); // Увеличил таймаут, чтобы ученик успел прочитать длинное сообщение
            }
        }

        // Обработка Enter в поле ввода
        document.getElementById('spell-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') checkSpelling();
        });

        // --- ЛОГИКА ИГРЫ "НАЙДИ ПАРУ" ---
        let selectedEn = null;
        let selectedRu = null;
        let matchedCount = 0;

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function renderMatchGame() {
            const colEn = document.getElementById('col-en');
            const colRu = document.getElementById('col-ru');
            
            colEn.innerHTML = '';
            colRu.innerHTML = '';

            const enList = shuffle([...matchWords.map(w => w.en)]);
            const ruList = shuffle([...matchWords.map(w => w.ru)]);

            enList.forEach(text => {
                const btn = document.createElement('button');
                btn.className = 'match-btn';
                btn.innerText = text;
                
                const wordObj = words.find(w => w.en === text);
                const speechOverride = wordObj ? wordObj.speech : null;

                btn.onclick = () => handleMatchClick(btn, 'en', text, speechOverride);
                colEn.appendChild(btn);
            });

            ruList.forEach(text => {
                const btn = document.createElement('button');
                btn.className = 'match-btn';
                btn.innerText = text;
                btn.onclick = () => handleMatchClick(btn, 'ru', text);
                colRu.appendChild(btn);
            });
        }

        function handleMatchClick(btn, lang, text, speechOverride = null) {
            if (btn.classList.contains('correct')) return;

            const colId = lang === 'en' ? 'col-en' : 'col-ru';
            document.querySelectorAll(`#${colId} .match-btn`).forEach(b => b.classList.remove('selected'));

            btn.classList.add('selected');

            if (lang === 'en') {
                selectedEn = { btn, text };
                speak(text, speechOverride); 
            } else {
                selectedRu = { btn, text };
            }

            if (selectedEn && selectedRu) {
                checkMatch();
            }
        }

        function checkMatch() {
            const isMatch = matchWords.some(w => w.en === selectedEn.text && w.ru === selectedRu.text);

            const btnEn = selectedEn.btn;
            const btnRu = selectedRu.btn;

            if (isMatch) {
                btnEn.classList.remove('selected');
                btnRu.classList.remove('selected');
                btnEn.classList.add('correct');
                btnRu.classList.add('correct');
                matchedCount++;

                if (matchedCount === matchWords.length) {
                    document.getElementById('success-msg').style.display = 'block';
                }
            } else {
                btnEn.classList.add('wrong');
                btnRu.classList.add('wrong');
                
                setTimeout(() => {
                    btnEn.classList.remove('wrong', 'selected');
                    btnRu.classList.remove('wrong', 'selected');
                }, 400); 
            }

            selectedEn = null;
            selectedRu = null;
        }

        function restartMatch() {
            matchedCount = 0;
            selectedEn = null;
            selectedRu = null;
            document.getElementById('success-msg').style.display = 'none';
            renderMatchGame();
        }

        // --- ОБЩАЯ ЛОГИКА ---
        function switchTab(tabId) {
            if (isAutoplaying) stopAutoplay(); 

            document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');

            // Фокус на инпут при переходе на вкладку Написание
            if (tabId === 'spell') {
                document.getElementById('spell-input').focus();
            }
        }

        // Управление стрелками на клавиатуре
        document.addEventListener('keydown', function(event) {
            if (document.getElementById('learn').classList.contains('active')) {
                if (event.key === 'ArrowRight') { if (isAutoplaying) stopAutoplay(); nextCard(); }
                if (event.key === 'ArrowLeft') { if (isAutoplaying) stopAutoplay(); prevCard(); }
            } else if (document.getElementById('pronounce').classList.contains('active')) {
                if (event.key === 'ArrowRight') nextPronounceCard();
                if (event.key === 'ArrowLeft') prevPronounceCard();
            } else if (document.getElementById('spell').classList.contains('active')) {
                // В написании стрелки работают только если фокус не в поле ввода (чтобы можно было редактировать текст)
                if (document.activeElement !== document.getElementById('spell-input')) {
                    if (event.key === 'ArrowRight') nextSpellCard();
                    if (event.key === 'ArrowLeft') prevSpellCard();
                }
            }
        });

        window.onload = () => {
            showCard(0, false); 
            showPronounceCard(0);
            showSpellCard(0);
            renderMatchGame();
        };
    </script>
</body>
</html>
