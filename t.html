<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Four - Cybercrime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f2041;
            color: white;
            user-select: none;
        }
        .board-bg {
            background-color: #1e4072;
            border-radius: 1rem;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        .cell {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background-color: #0f2041;
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            font-weight: bold;
            color: #4a6b9c;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .cell:hover {
            transform: scale(1.05);
            background-color: #162f5d;
        }
        .cell.red {
            background-color: #ef4444;
            color: white;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.6), inset 0 -4px 6px rgba(0,0,0,0.3);
        }
        .cell.yellow {
            background-color: #facc15;
            color: #854d0e;
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.6), inset 0 -4px 6px rgba(0,0,0,0.3);
        }
        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
        }
        .active-team-indicator {
            box-shadow: 0 0 20px 5px currentColor;
            transform: scale(1.1);
        }
        .reveal-box {
            background-color: #e5e7eb;
            color: transparent;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 0.5rem;
            padding: 0.5rem 1rem;
            display: inline-block;
            user-select: none;
        }
        .reveal-box.revealed {
            background-color: #dbeafe;
            color: #1e3a8a;
            font-weight: 600;
        }
        .blank-word {
            display: inline-block;
            min-width: 120px;
            border-bottom: 2px dashed #3b82f6;
            color: transparent;
            cursor: pointer;
            text-align: center;
            padding: 0 5px;
            transition: all 0.3s;
        }
        .blank-word.filled {
            color: #15803d;
            font-weight: bold;
            border-bottom: 2px solid #15803d;
        }
        .tf-statement {
            cursor: pointer;
            transition: all 0.3s;
        }
        .tf-statement.correct {
            background-color: #dcfce7;
            border-color: #22c55e;
            color: #166534;
        }
        .tf-statement.incorrect {
            background-color: #fee2e2;
            border-color: #ef4444;
            color: #991b1b;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
        .shake-animation {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-7xl w-full px-8 grid grid-cols-1 lg:grid-cols-2 gap-12 items-center mx-auto">
        
        <div class="flex flex-col items-center lg:items-start space-y-8">
            <div>
                <h1 class="text-7xl font-black tracking-tighter text-gray-200 leading-none">CONNECT<br>FOUR</h1>
                <p class="text-lg tracking-widest text-gray-400 mt-2 uppercase">Combating Cybercrime</p>
            </div>

            <div class="flex space-x-16 items-center mt-8">
                <div class="flex flex-col items-center space-y-3">
                    <span class="text-lg font-bold text-gray-400">TEAM 1</span>
                    <div id="team-red" class="w-20 h-20 rounded-full bg-red-500 text-red-500 transition-all duration-300"></div>
                </div>
                <div class="flex flex-col items-center space-y-3">
                    <span class="text-lg font-bold text-gray-400">TEAM 2</span>
                    <div id="team-yellow" class="w-20 h-20 rounded-full bg-yellow-400 text-yellow-400 transition-all duration-300"></div>
                </div>
            </div>

            <button onclick="resetGame()" class="mt-8 px-8 py-4 bg-teal-600 hover:bg-teal-500 text-white text-xl font-bold rounded-full shadow-lg transition-colors">
                START OVER?
            </button>
        </div>

        <div class="flex justify-center">
            <div class="board-bg p-6 grid grid-cols-5 gap-4" id="board">
            </div>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 modal-overlay hidden flex items-center justify-center z-50 p-6">
        <div id="modal-window" class="bg-white text-gray-800 rounded-2xl shadow-2xl max-w-5xl w-full max-h-[95vh] flex flex-col transition-transform">
            <div class="p-6 border-b border-gray-200 flex justify-between items-center bg-gray-50 rounded-t-2xl">
                <h2 id="modal-title" class="text-3xl font-bold text-blue-900">Task</h2>
                <button id="modal-close-btn" onclick="closeModal()" class="text-gray-400 hover:text-red-500 text-4xl font-bold leading-none">&times;</button>
            </div>
            
            <div id="modal-content" class="p-8 text-xl space-y-6 overflow-y-auto flex-grow">
            </div>

            <div id="modal-actions" class="p-6 border-t border-gray-200 bg-gray-50 rounded-b-2xl flex justify-between items-center">
                <button onclick="closeModal()" class="px-6 py-3 text-gray-500 hover:text-gray-700 text-lg font-semibold">Close</button>
                <div class="space-x-4">
                    <button onclick="handleAnswer(false)" class="px-8 py-3 bg-red-100 text-red-700 hover:bg-red-200 text-lg font-bold rounded-xl transition-colors">Incorrect / Skip</button>
                    <button onclick="handleAnswer(true)" class="px-8 py-3 bg-green-500 text-white hover:bg-green-600 text-lg font-bold rounded-xl shadow transition-colors">Correct (Take Cell)</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function reveal(el) { el.classList.add('revealed'); }
        function fillBlank(el, word) { el.innerText = word; el.classList.add('filled'); }
        function checkTF(el, isCorrect) { 
            el.classList.remove('bg-gray-100');
            if(isCorrect) el.classList.add('correct'); 
            else el.classList.add('incorrect'); 
        }
        
        function speakAndHighlight(el, text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-GB';
                
                const voices = window.speechSynthesis.getVoices();
                const gbVoice = voices.find(voice => voice.lang === 'en-GB' || voice.lang === 'en_GB');
                if (gbVoice) utterance.voice = gbVoice;

                window.speechSynthesis.speak(utterance);
            }
            el.classList.add('bg-green-200');

                        <p>Security analysts also warn that fake emails and suspicious links remain one of the most common methods of online (4) <span class="blank-word" onclick="fillBlank(this, 'fraud')">__________</span> targeting ordinary users. Law enforcement agencies stress that stronger cyber security and international (5) <span class="blank-word" onclick="fillBlank(this, 'cooperation')">__________</span> are necessary to fight global cybercrime effectively.</p>

                        <div class="flex flex-col items-center space-y-4">

                        <div class="flex flex-col items-center space-y-4">

                    <div class="flex flex-wrap gap-6 text-3xl font-bold justify-center mt-4">
                        <span class="p-6 bg-blue-50 text-blue-900 rounded-xl shadow cursor-pointer hover:bg-blue-100 transition" onclick="speakAndHighlight(this, 'A novice')">A novice</span>

                title: "Choose the incorrect statement",
                content: `
                    <p class="text-gray-500 text-base mb-4">Tap a statement to check if it's correct (Green) or incorrect (Red).</p>
                    <div class="space-y-4 text-xl">
                        <div class="tf-statement p-5 bg-gray-100 border-2 border-transparent rounded-xl" onclick="checkTF(this, false)">
                            Cybercrimes are mostly committed by organized criminals
                        </div>
                        <div class="tf-statement p-5 bg-gray-100 border-2 border-transparent rounded-xl" onclick="checkTF(this, true)">
                            Modern advanced techniques such as AI-driven forensic software can help law-enforcement agencies to solve cybercrimes
                        </div>
                        <div class="tf-statement p-5 bg-gray-100 border-2 border-transparent rounded-xl" onclick="checkTF(this, true)">

        let currentPlayer = 'red';
        let boardState = Array(25).fill(null);
        let currentActiveCell = null;
        let gameActive = true;
        let cellToTaskMap = {};

        const gridLayout = [
            25, 24, 23, 22, 21,
            16, 17, 18, 19, 20,
            15, 14, 13, 12, 11,
            6,  7,  8,  9,  10,
            1,  2,  3,  4,  5
        ];

        function initBoard() {
            let taskIds = Object.keys(tasks);
            taskIds.sort(() => Math.random() - 0.5);
            
            gridLayout.forEach((cellNum, index) => {
                cellToTaskMap[cellNum] = taskIds[index];
            });

            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            gridLayout.forEach((num, index) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerText = num;
                cell.onclick = () => cellClicked(num, index);
                cell.id = `cell-${index}`;
                boardEl.appendChild(cell);
            });
            updateTurnIndicator();
        }

        function cellClicked(num, index) {
            if (!gameActive || boardState[index] !== null) return;

            currentActiveCell = index;
            const taskId = cellToTaskMap[num];
            const task = tasks[taskId];

            if (task.type === 'lucky') {
                showSpecialModal("🍀 Lucky Moment!", "Time to relax and score a point. Your team gets this cell for free!", "bg-green-500", () => {
                    boardState[index] = currentPlayer;
                    updateBoardUI();
                    if(!checkWin()) switchTurn();
                });
            } else if (task.type === 'oops') {
                showSpecialModal("⚠️ Oops!", "The turn goes to the opponent; you don’t get anything.", "bg-red-500", () => {
                    boardState[index] = 'disabled';
                    updateBoardUI();
                    switchTurn();
                });
            } else {
                openModal(task);
            }
        }

        function openModal(task) {
            document.getElementById('modal-title').innerText = task.title;
            document.getElementById('modal-content').innerHTML = task.content;
            document.getElementById('modal-actions').classList.remove('hidden');
            document.getElementById('modal-close-btn').classList.remove('hidden');
            document.getElementById('modal').classList.remove('hidden');
        }

        function showSpecialModal(title, text, colorClass, callback) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-content').innerHTML = `<div class="text-center text-4xl font-bold p-12 ${colorClass} text-white rounded-2xl shadow-inner">${text}</div>`;
            document.getElementById('modal-actions').classList.add('hidden');
            document.getElementById('modal-close-btn').classList.add('hidden');
            document.getElementById('modal').classList.remove('hidden');
            
            setTimeout(() => {
                closeModal();
                callback();
            }, 3000);
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            currentActiveCell = null;
        }

        function handleAnswer(isCorrect) {
            if (isCorrect && currentActiveCell !== null) {
                boardState[currentActiveCell] = currentPlayer;
                updateBoardUI();
                if(checkWin()) {
                    closeModal();
                    return;
                }
                switchTurn();
                closeModal();
            } else {
                const modalWindow = document.getElementById('modal-window');
                modalWindow.classList.add('shake-animation');
                
                setTimeout(() => {
                    modalWindow.classList.remove('shake-animation');
                    switchTurn();
                    closeModal();
                }, 600);
            }
        }

        function switchTurn() {
            currentPlayer = currentPlayer === 'red' ? 'yellow' : 'red';
            updateTurnIndicator();
        }

        function updateTurnIndicator() {
            document.getElementById('team-red').classList.remove('active-team-indicator');
            document.getElementById('team-yellow').classList.remove('active-team-indicator');
            document.getElementById(`team-${currentPlayer}`).classList.add('active-team-indicator');
        }

        function updateBoardUI() {
            boardState.forEach((state, index) => {
                const cell = document.getElementById(`cell-${index}`);
                cell.className = 'cell';
                if (state === 'red') cell.classList.add('red');
                if (state === 'yellow') cell.classList.add('yellow');
                if (state === 'disabled') {
                    cell.classList.add('bg-gray-700', 'text-gray-500', 'cursor-not-allowed', 'opacity-50');
                }
            });
        }

        function checkWin() {
            const size = 5;
            const winLength = 4;

            const getColor = (x, y) => {
                if (x < 0 || x >= size || y < 0 || y >= size) return null;
                return boardState[y * size + x];
            };

            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    const color = getColor(x, y);
                    if (!color || color === 'disabled') continue;

                    if (x <= size - winLength && color === getColor(x+1, y) && color === getColor(x+2, y) && color === getColor(x+3, y)) return declareWinner(color);
                    if (y <= size - winLength && color === getColor(x, y+1) && color === getColor(x, y+2) && color === getColor(x, y+3)) return declareWinner(color);
                    if (x <= size - winLength && y <= size - winLength && color === getColor(x+1, y+1) && color === getColor(x+2, y+2) && color === getColor(x+3, y+3)) return declareWinner(color);
                    if (x >= winLength - 1 && y <= size - winLength && color === getColor(x-1, y+1) && color === getColor(x-2, y+2) && color === getColor(x-3, y+3)) return declareWinner(color);
                }
            }
            return false;
        }

        function declareWinner(color) {
            gameActive = false;
            const teamName = color === 'red' ? 'TEAM 1 (RED)' : 'TEAM 2 (YELLOW)';
            setTimeout(() => {
                showSpecialModal("🎉 WE HAVE A WINNER!", `${teamName} WINS THE GAME!`, color === 'red' ? 'bg-red-500' : 'bg-yellow-500', () => {});
            }, 500);
            return true;
        }

        function resetGame() {
            boardState = Array(25).fill(null);
            currentPlayer = Math.random() < 0.5 ? 'red' : 'yellow';
            gameActive = true;
            initBoard();
            updateBoardUI();
        }

        currentPlayer = Math.random() < 0.5 ? 'red' : 'yellow';
        initBoard();
    </script>
</body>
